spring:
  application:
    name: iam-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iam}
    username: ${DB_USERNAME:iam}
    password: ${DB_PASSWORD:iam}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

app:
  security:
    jwt:
      # DEV DEFAULT ONLY. Override in every non-local environment via JWT_SECRET.
      # Must be at least 32 bytes for HS256.
      secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-please-32bytes!!}
      issuer: iam-service
      # seconds
      access-token-ttl: ${ACCESS_TOKEN_TTL:900}      # 15 minutes
      refresh-token-ttl: ${REFRESH_TOKEN_TTL:2592000} # 30 days
    lockout:
      max-failed-attempts: ${MAX_FAILED_ATTEMPTS:5}
  seed:
    enabled: ${SEED_ENABLED:false}
    tenant-id: ${SEED_TENANT:primary}
    admin-email: ${SEED_ADMIN_EMAIL:admin@example.com}
    # DEMO ONLY — not a real secret. Change before any real use.
    admin-password: ${SEED_ADMIN_PASSWORD:ChangeMe123!}

logging:
  level:
    org.flywaydb: info
